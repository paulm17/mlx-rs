[harness]
prompt = "What is 2 + 2? Answer with just the number."
vision_prompt = "Describe this image in one sentence."
max_tokens = 128
temperature = 0.0
top_p = 0.9
system_prompt = "You are a helpful assistant."
expected_answer = "4"
run_tokenizer_roundtrip = true
run_reasoning_check = true
run_moe_performance_check = true
moe_min_tokens_per_sec = 1.0
vision_image = "red_square.png"

[models]
models = [
