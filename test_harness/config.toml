[harness]
prompt = "What is 2 + 2? Answer with just the number."
max_tokens = 128
temperature = 0.0
top_p = 0.9
system_prompt = "You are a helpful assistant."
expected_answer = "4"
run_tokenizer_roundtrip = true
run_reasoning_check = true
run_moe_performance_check = true
moe_min_tokens_per_sec = 1.0

[models]
# List models to test. Each entry is a model identifier (Hugging Face repo ID or local path).
models = [
    "mlx-community/Qwen1.5-MoE-A2.7B-4bit",
    "mlx-community/Qwen2-0.5B",
    "mlx-community/Qwen3-1.7B-4bit",
    "mlx-community/Qwen3.5-0.8B-MLX-4bit",
    "mlx-community/LFM2.5-1.2B-Instruct-4bit",
    "prism-ml/Ternary-Bonsai-1.7B-mlx-2bit",
    "mlx-community/Llama-3.2-1B-Instruct-4bit",
    "mlx-community/gemma-3-1b-it-4bit",
    "mlx-community/gemma-3-text-12b-it-4bit",
    "mlx-community/Mistral-7B-Instruct-v0.3-4bit",
    "mlx-community/Phi-4-mini-instruct-4bit",
    "mlx-community/DeepSeek-R1-Distill-Qwen-1.5B-4bit"
]
